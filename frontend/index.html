<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ═══ Primary SEO ═══ -->
    <title>ContLinks — Guest Post &amp; Link Building Marketplace</title>
    <meta
      name="description"
      content="Buy and sell guest posts, sponsored content, and link placements on high-authority websites. Connect advertisers with premium publishers on ContLinks."
    />
    <meta name="author" content="ContLinks" />
    <meta
      name="keywords"
      content="guest posting, link building, SEO marketplace, sponsored content, backlinks, publisher dashboard, advertiser dashboard, DA websites, contlinks"
    />
    <link rel="canonical" href="https://contlinks.com/" />

    <!-- ═══ Viewport (responsive) ═══ -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- ═══ Crawl permissions ═══ -->
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="perplexity-bot" content="index, follow" />

    <!-- ═══ Open Graph — Facebook / LinkedIn / General ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ContLinks" />
    <meta
      property="og:title"
      content="ContLinks — Guest Post &amp; Link Building Marketplace"
    />
    <meta
      property="og:description"
      content="Buy and sell guest posts, sponsored content, and link placements on high-authority websites. The #1 marketplace for link builders and publishers."
    />
    <meta property="og:url" content="https://contlinks.com/" />
    <meta property="og:image" content="https://contlinks.com/favicon.png" />
    <meta
      property="og:image:alt"
      content="ContLinks — Guest Post and Link Building Marketplace"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="en_US" />

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@contlinks" />
    <meta name="twitter:creator" content="@contlinks" />
    <meta
      name="twitter:title"
      content="ContLinks — Guest Post &amp; Link Building Marketplace"
    />
    <meta
      name="twitter:description"
      content="Buy and sell guest posts and link placements on 10,000+ high-authority websites. Grow your SEO with ContLinks."
    />
    <meta name="twitter:image" content="https://contlinks.com/favicon.png" />
    <meta name="twitter:image:alt" content="ContLinks marketplace logo" />

    <!-- ═══ Favicon &amp; App Icons (PNG only — no .ico) ═══ -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- ═══ Web App Manifest ═══ -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ═══ Theme colours ═══ -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-TileImage" content="/favicon.png" />
    <meta name="application-name" content="ContLinks" />

    <!-- ═══ Sitemap hint for crawlers ═══ -->
    <link
      rel="sitemap"
      type="application/xml"
      title="Sitemap"
      href="/sitemap.xml"
    />

    <!-- ═══ JSON-LD Structured Data ═══ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://contlinks.com/#website",
            "url": "https://contlinks.com/",
            "name": "ContLinks",
            "description": "A professional marketplace for buying and selling guest posts, sponsored content, and link placements on high-authority websites.",
            "inLanguage": "en-US",
            "potentialAction": {
              "@type": "SearchAction",
              "target": {
                "@type": "EntryPoint",
                "urlTemplate": "https://contlinks.com/#catalogue?q={search_term_string}"
              },
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "WebApplication",
            "@id": "https://contlinks.com/#app",
            "name": "ContLinks Dashboard",
            "url": "https://contlinks.com/",
            "applicationCategory": "BusinessApplication",
            "operatingSystem": "Web",
            "description": "A two-sided marketplace dashboard for advertisers and publishers to manage guest posting campaigns, track orders, monitor earnings, and communicate in real-time.",
            "screenshot": "https://contlinks.com/favicon.png",
            "featureList": [
              "Publisher catalogue with DA/traffic filters",
              "Order management and tracking",
              "Campaign project management",
              "Wallet with deposit and withdrawal",
              "Real-time messaging",
              "Earnings and QA analytics charts"
            ],
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD",
              "description": "Free to register. Pay per guest post placement."
            }
          },
          {
            "@type": "Organization",
            "@id": "https://contlinks.com/#organization",
            "name": "ContLinks",
            "url": "https://contlinks.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://contlinks.com/favicon.png",
              "width": 512,
              "height": 512
            },
            "description": "ContLinks connects SEO professionals and digital marketers with premium website publishers for guest post and link building campaigns.",
            "sameAs": [
              "https://twitter.com/contlinks"
            ]
          },
          {
            "@type": "SoftwareApplication",
            "name": "ContLinks Advertiser Dashboard",
            "applicationCategory": "MarketingApplication",
            "operatingSystem": "Web",
            "description": "Advertiser-facing dashboard to browse publisher websites, manage link building projects, track orders, and handle payments.",
            "url": "https://contlinks.com/#dashboard"
          },
          {
            "@type": "SoftwareApplication",
            "name": "ContLinks Publisher Dashboard",
            "applicationCategory": "MarketingApplication",
            "operatingSystem": "Web",
            "description": "Publisher-facing dashboard to list websites, manage incoming orders, track earnings, and communicate with advertisers.",
            "url": "https://contlinks.com/#my-portals"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/index.jsx"></script>
  </body>
</html>
